<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hidaayah School Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2e7d32; --admin-color: #1565c0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f3; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1300px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #fbc02d; padding-bottom: 10px; margin-bottom: 15px; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .term-box { background: #fff3e0; padding: 10px; border-radius: 8px; display: inline-block; font-weight: bold; color: #e65100; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f8f9fa; color: #333; }
        .rank-badge { background: #ffd700; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .editable { cursor: pointer; color: var(--primary); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container" id="mainCont">
    <div id="loginSection">
        <h1 style="text-align:center; color:var(--primary);">AL-HIDAAYAH PORTAL</h1>
        <input type="text" id="userName" placeholder="Teacher/Admin Name">
        <input type="password" id="accessCode" placeholder="Access Code (Enter Secret Code)">
        <button onclick="checkLogin()" style="width:100%;">SIGN IN</button>
    </div>

    <div id="appSection" style="display:none;">
        <div class="nav-bar">
            <h2 id="displayRole">Dashboard</h2>
            <div>
                <span class="term-box" id="termDisplay">TERM: 1</span>
                <button onclick="location.reload()" style="background:#d32f2f; margin-left:10px;">LOGOUT</button>
            </div>
        </div>

        <div style="display: flex; gap: 8px; flex-wrap: wrap; background: #e8f5e9; padding: 10px; border-radius: 8px;">
            <select id="classFilter" onchange="renderTable()" style="flex:1;">
                <option value="All">All Classes</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <input type="text" id="newName" placeholder="Learner Name" style="flex:2;">
            <select id="newClass" style="flex:1;"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <button onclick="addLearner()" style="flex:1;">+ Register</button>
           
            <button id="termBtn" onclick="changeTerm()" style="background:#e65100; display:none;">Change Term</button>
        </div>

        <table>
            <thead>
                <tr id="thr"></tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>

        <div id="adminLog" style="display:none; margin-top:20px; font-size:12px; color:#666;">
            <h3>Staff Activity Log</h3>
            <div id="logContent"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ugandaschoolportal-7e2f9-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
   
    let learnersList = [];
    let currentRole = "";

function checkLogin() {
    const user = document.getElementById('userName').value.trim();
    const code = document.getElementById('accessCode').value.trim();
    const cont = document.getElementById('mainCont');

    // If the name box is empty, don't let them in
    if (user === "") {
        return alert("Please enter your name first!");
    }

    if (code === "Admin256") {
        currentRole = "admin";
        document.getElementById('termBtn').style.display = "inline-block";
        document.getElementById('adminLog').style.display = "block";
        cont.className = "container admin-mode";
    } else if (code === "Staff2026") {
        currentRole = "teacher";
        cont.className = "container teacher-mode";
    } else {
        return alert("Invalid Access Code! Contact Admin.");
    }

    // This part sends the name to Firebase
    db.ref('logs').push({
        user: user,
        time: new Date().toLocaleString(),
        role: currentRole
    });

    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('appSection').style.display = 'block';
    document.getElementById('displayRole').innerText = user;
    renderTable();
}

    // --- TERM LOGIC ---
    function changeTerm() {
        const newT = prompt("Enter Term Number (1, 2, or 3):");
        if(newT) db.ref('currentTerm').set(newT);
    }
    db.ref('currentTerm').on('value', (s) => {
        document.getElementById('termDisplay').innerText = "TERM: " + (s.val() || "1");
    });

    function addLearner() {
        const name = document.getElementById('newName').value;
        const cls = document.getElementById('newClass').value;
        if(name) db.ref('students').push({ name: name, class: cls, q: 0, f: 0, l: 0, t: 0 // Use single letters here!
    });
        document.getElementById('newName').value = "";
    }

    function renderTable() {
        const filter = document.getElementById('classFilter').value;
        const thr = document.getElementById('thr');
        const tbody = document.getElementById('rows');
       
        // Dynamic Headers
        thr.innerHTML = `<th>NAME</th><th>CLASS</th>${currentRole === 'admin' ? '<th>RANK</th>' : ''}<th>QURAN</th><th>FIQH</th><th>LUGANDA</th><th>TARBIYA</th><th>TOTAL</th><th>AVG</th><th>ACTION</th>`;
       
        // --- SORTING BY RANK ---
        // We calculate (qur+fiq+lug+tar) and sort highest to lowest
        let filtered = learnersList;
        if(filter !== "All") filtered = learnersList.filter(s => s.class === filter);
       
        filtered.sort((a,b) => ((b.q+b.f+b.l+b.t) - (a.q+a.f+a.l+a.t)));

        tbody.innerHTML = filtered.map((s, index) => {
     // Change from qur, fiq, lug, tar to q, f, l, t
        const total = (s.q || 0) + (s.f || 0) + (s.l || 0) + (s.t || 0);
        const avg = (total / 4).toFixed(1);
            return `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.class}</td>
                    ${currentRole === 'admin' ? `<td><span class="rank-badge">${index+1}</span></td>` : ''}
                    <td class="editable" onclick="editMark('${s.id}', 'q', ${s.q || 0})">${s.q || 0}</td>
                    <td class="editable" onclick="editMark('${s.id}', 'f', ${s.f || 0})">${s.f || 0}</td>
                    <td class="editable" onclick="editMark('${s.id}', 'l', ${s.l || 0})">${s.l || 0}</td>
                    <td class="editable" onclick="editMark('${s.id}', 't', ${s.t || 0})">${s.t || 0}</td>
                    <td style="font-weight:bold;">${total}</td>
                    <td>${avg}%</td>
                    <td><button style="background:red;width:auto;padding:2px 8px;" onclick="del('${s.id}')">Del</button></td>
                </tr>`;
        }).join('');
    }

    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        learnersList = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
        renderTable();
    });

    db.ref('logs').limitToLast(3).on('value', (snap) => {
        const logs = snap.val();
        if(logs) document.getElementById('logContent').innerHTML = Object.values(logs).reverse()
            .map(l => `<p>${l.user} (${l.role}) - ${l.time}</p>`).join('');
    });

    function editMark(id, subj, cur) {
        const v = prompt("Enter new mark:", cur);
        if(v !== null && !isNaN(v)) db.ref('students/'+id).update({ [subj]: parseInt(v) });
    }
    function del(id) { if(confirm("Delete learner?")) db.ref('students/'+id).remove(); }
</script>
</body>
</html>
