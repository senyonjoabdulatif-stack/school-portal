<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hidaayah School Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2e7d32; --accent: #fbc02d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f3; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 1100px; margin: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; text-transform: uppercase; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        input, select, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        .editable { cursor: pointer; background: #fffde7; font-weight: bold; }
        .del-btn { background: #d32f2f; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h1>Al-Hidaayah Portal Login</h1>
        <input type="password" id="masterCode" placeholder="Enter Teacher Access Code">
        <button onclick="checkLogin()">SIGN IN</button>
    </div>

    <div id="appSection" style="display:none;">
        <div class="nav-bar">
            <h2 style="color: var(--primary); margin:0;">AL-HIDAAYAH SCHOOL</h2>
            <button onclick="location.reload()" style="width:100px; background:#555;">LOGOUT</button>
        </div>

        <div class="admin-box">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; align-items: end;">
                <div>
                    <label><b>🔍 Filter Class:</b></label>
                    <select id="classFilter" onchange="renderTable()">
                        <option value="All">Show All</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option>
                        <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                </div>
                <div>
                    <label>New Learner Name:</label>
                    <input type="text" id="newName" placeholder="Full Name">
                </div>
                <div>
                    <label>Class:</label>
                    <select id="newClass">
                        <option>P.1</option><option>P.2</option><option>P.3</option>
                        <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                </div>
                <button onclick="addLearner()">+ ADD LEARNER</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>NAME</th><th>CLASS</th>
                    <th>QURAN</th><th>FIQH</th><th>LUGANDA</th><th>TARBIYA</th>
                    <th>TOTAL</th><th>ACTION</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (Use your URL from photo 8ba49c6b) ---
    const firebaseConfig = {
        databaseURL: "https://ugandaschoolportal-7e2f9-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let learnersList = [];

    // --- LOGIN LOGIC ---
    function checkLogin() {
        const code = document.getElementById('masterCode').value;
        if (code === "2026") { // Set your own password here
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        } else {
            alert("Incorrect Access Code!");
        }
    }

    // --- ADD LEARNER ---
    function addLearner() {
        const name = document.getElementById('newName').value.trim();
        const cls = document.getElementById('newClass').value;
        if (!name) return alert("Please enter a name");

        db.ref('students').push({
            name: name, class: cls,
            qur: 0, fiq: 0, lug: 0, tar: 0
        }).then(() => {
            document.getElementById('newName').value = "";
            alert("Learner Added!");
        });
    }

    // --- EDIT MARKS ---
    function editMark(id, subject, current) {
        const newVal = prompt(`Enter score for ${subject}:`, current);
        if (newVal !== null && !isNaN(newVal)) {
            db.ref('students/' + id).update({ [subject]: parseInt(newVal) });
        }
    }

    // --- DELETE ---
    function deleteLearner(id) {
        if (confirm("Delete this record permanently?")) {
            db.ref('students/' + id).remove();
        }
    }

    // --- RENDER TABLE ---
    function renderTable() {
        const filter = document.getElementById('classFilter').value;
        const tbody = document.getElementById('rows');
        tbody.innerHTML = "";

        learnersList.forEach(item => {
            if (filter !== "All" && item.class !== filter) return;

            const total = (item.qur || 0) + (item.fiq || 0) + (item.lug || 0) + (item.tar || 0);
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.class}</td>
                    <td class="editable" onclick="editMark('${item.id}','qur',${item.qur})">${item.qur}</td>
                    <td class="editable" onclick="editMark('${item.id}','fiq',${item.fiq})">${item.fiq}</td>
                    <td class="editable" onclick="editMark('${item.id}','lug',${item.lug})">${item.lug}</td>
                    <td class="editable" onclick="editMark('${item.id}','tar',${item.tar})">${item.tar}</td>
                    <td style="font-weight:bold;">${total}</td>
                    <td><button class="del-btn" onclick="deleteLearner('${item.id}')">Del</button></td>
                </tr>`;
        });
    }

    // --- DATA WATCHER ---
    db.ref('students').on('value', (snapshot) => {
        const data = snapshot.val();
        learnersList = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        renderTable();
    });
</script>
</body>
</html>
