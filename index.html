<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hidaayah School Portal</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #fbc02d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; max-width: 1100px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); text-align: center; text-transform: uppercase; }
        input, select, button { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <input type="hidden" id="userRole" value="">

    <div id="loginSection">
        <h1>School Portal Login</h1>
        <input type="text" id="uName" placeholder="Enter Name">
        <input type="password" id="uPass" placeholder="Enter Master Code">
        <button onclick="doLogin()">SIGN IN</button>
    </div>

    <div id="appSection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 3px solid var(--primary); padding-bottom: 10px;">
            <h2 style="margin:0;">AL-HIDAAYAH NURSERY AND PRIMARY SCHOOL</h2>
            <button onclick="location.reload()" style="width:120px; background:#d32f2f;">LOGOUT</button>
        </div>

        <div id="adminControls" style="display:none; margin-top:20px; padding:20px; background:#f5f5f5; border-radius:10px;">
            <h3>Register New Student</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
                <input type="text" id="stuName" placeholder="Student Full Name">
                <select id="stuClass">
                    <option>P.1</option><option>P.2</option><option>P.3</option>
                    <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <button onclick="addStudent()">ADD STUDENT</button>
            </div>
        </div>

        <table>
            <thead id="tableHead"></thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</div>

<script>
    // --- LOGIN SYSTEM ---
    function doLogin() {
        const userInput = document.getElementById('uName').value.trim();
        const passInput = document.getElementById('uPass').value.trim();
        const roleBox = document.getElementById('userRole');

        if (userInput.toLowerCase() === 'admin256' && passInput === '1234') {
            roleBox.value = 'admin';
            document.getElementById('adminControls').style.display = 'block';
            showApp();
        } else if (passInput === 'Staff2026') {
            roleBox.value = 'staff';
            document.getElementById('adminControls').style.display = 'none';
            showApp();
        } else {
            alert("Invalid Login! Please check your name and code.");
        }
    }

    function showApp() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'block';
        updateHeader();
        render(); // This will load your students
    }

    function updateHeader() {
        const role = document.getElementById('userRole').value;
        const head = document.getElementById('tableHead');
        head.innerHTML = `
            <tr>
                <th>STUDENT NAME</th>
                <th>CLASS</th>
                ${role === 'admin' ? '<th>RANK</th>' : ''}
                <th>QURAN</th><th>FIQH</th><th>LUGHA</th><th>TARBIYA</th>
                ${role === 'admin' ? '<th>TOTAL</th><th>AVG</th>' : ''}
                <th>ACTION</th>
            </tr>`;
    }

    // --- DATA HANDLING ---
    // Placeholder data - replace this with your Firebase db.on('value') logic
    let students = [
        { id: '101', name: 'Musa Kato', class: 'P.1', qur: 85, fiq: 78, lug: 92, tar: 88 }
    ];

    function render() {
        const role = document.getElementById('userRole').value;
        const tbody = document.getElementById('rows');
       
        // Sorting for Rank
        students.sort((a,b) => (b.qur+b.fiq+b.lug+b.tar) - (a.qur+a.fiq+a.lug+a.tar));

        tbody.innerHTML = students.map((s, index) => {
            const total = (s.qur + s.fiq + s.lug + s.tar);
            const avg = (total / 4).toFixed(1);
            return `
                <tr>
                    <td>${s.name}</td>
                    <td><span class="badge" style="background:#eee;">${s.class}</span></td>
                    ${role === 'admin' ? `<td style="font-weight:bold; color:var(--primary);">#${index+1}</td>` : ''}
                    <td>${s.qur}</td><td>${s.fiq}</td><td>${s.lug}</td><td>${s.tar}</td>
                    ${role === 'admin' ? `<td style="background:#fff9c4;">${total}</td><td>${avg}%</td>` : ''}
                    <td><button style="background:#555; padding:5px 10px; width:auto;" onclick="delStudent('${s.id}')">Delete</button></td>
                </tr>`;
        }).join('');
    }
    function delStudent(id) {
    if (confirm("Are you sure you want to delete this student?")) {
        // This targets the specific student in your 'students' folder in Firebase
        db.ref('students/' + id).remove()
        .then(() => {
            alert("Student deleted successfully!");
            // The page will automatically update if you have db.on('value') running
        })
        .catch((error) => {
            console.error("Error removing student: ", error);
            alert("Failed to delete. Check your internet connection.");
        });
    }
}
</script>
</body>
</html>
