<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hidaayah School Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2e7d32; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; max-width: 1100px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .controls-row { display: flex; gap: 10px; background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: flex-end; }
        .filter-section { background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffe0b2; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        .editable { cursor: pointer; background: #fffde7; font-weight: bold; color: #2e7d32; }
        .editable:hover { background: #fff9c4; text-decoration: underline; }
        .del-btn { background: #d32f2f; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>AL-HIDAAYAH NURSERY AND PRIMARY SCHOOL</h1>

    <div class="filter-section">
        <label style="font-weight: bold; color: #e65100;">🔍 Filter by Class:</label>
        <select id="classFilter" onchange="render()" style="border: 2px solid #ffb74d;">
            <option value="All">Show All Learners</option>
            <option value="P.1">P.1 Only</option>
            <option value="P.2">P.2 Only</option>
            <option value="P.3">P.3 Only</option>
            <option value="P.4">P.4 Only</option>
            <option value="P.5">P.5 Only</option>
            <option value="P.6">P.6 Only</option>
            <option value="P.7">P.7 Only</option>
        </select>
    </div>

    <div class="controls-row">
        <div style="flex: 2;">
            <label>Learner Name:</label>
            <input type="text" id="stuName" placeholder="Full Name">
        </div>
        <div style="flex: 1;">
            <label>Class:</label>
            <select id="stuClass">
                <option>P.1</option><option>P.2</option><option>P.3</option>
                <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
        </div>
        <div style="flex: 1;">
            <button onclick="addStudent()">+ Register</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>NAME</th><th>CLASS</th>
                <th>QURAN</th><th>FIQH</th><th>LUGHA</th><th>TARBIYA</th>
                <th>TOTAL</th><th>ACTION</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allLearners = []; // Local copy of data

    // ADD LEARNER
    function addStudent() {
        const name = document.getElementById('stuName').value.trim();
        const sClass = document.getElementById('stuClass').value;
        if (name === "") return alert("Enter a name");

        db.ref('students').push({
            name: name, class: sClass,
            qur: 0, fiq: 0, lug: 0, tar: 0
        }).then(() => { document.getElementById('stuName').value = ""; });
    }

    // DELETE LEARNER
    function delStudent(id) {
        if (confirm("Delete this learner?")) db.ref('students/' + id).remove();
    }

    // EDIT MARKS
    function editMark(id, subject, currentVal) {
        const newVal = prompt(`Enter new score for ${subject}:`, currentVal);
        if (newVal !== null && !isNaN(newVal)) {
            let updateData = {};
            updateData[subject] = parseInt(newVal);
            db.ref('students/' + id).update(updateData);
        }
    }

    // RENDER TABLE (Includes Filter Logic)
    function render() {
        const filterValue = document.getElementById('classFilter').value;
        const tbody = document.getElementById('rows');
        tbody.innerHTML = "";

        allLearners.forEach(learner => {
            // FILTER LOGIC: If filter is not "All", skip learners who don't match the class
            if (filterValue !== "All" && learner.class !== filterValue) return;

            const total = (learner.qur || 0) + (learner.fiq || 0) + (learner.lug || 0) + (learner.tar || 0);
            tbody.innerHTML += `
                <tr>
                    <td>${learner.name}</td>
                    <td>${learner.class}</td>
                    <td class="editable" onclick="editMark('${learner.id}', 'qur', ${learner.qur})">${learner.qur}</td>
                    <td class="editable" onclick="editMark('${learner.id}', 'fiq', ${learner.fiq})">${learner.fiq}</td>
                    <td class="editable" onclick="editMark('${learner.id}', 'lug', ${learner.lug})">${learner.lug}</td>
                    <td class="editable" onclick="editMark('${learner.id}', 'tar', ${learner.tar})">${learner.tar}</td>
                    <td style="font-weight:bold;">${total}</td>
                    <td><button class="del-btn" onclick="delStudent('${learner.id}')">Delete</button></td>
                </tr>`;
        });
    }

    // DATA LISTENER
    db.ref('students').on('value', (snapshot) => {
        const data = snapshot.val();
        allLearners = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        render();
    });
</script>
</body>
</html>
